name: Build Bambu Studio Kasm Workspace

on:
  push:
    branches:
      - main
    paths:
      - bambu-studio/**
      - .github/workflows/build-bambu-studio.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-bambu-studio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Bambu Studio workspace image
        uses: docker/build-push-action@v6
        with:
          context: ./bambu-studio
          file: ./bambu-studio/Dockerfile
          push: true
          tags: |
            ghcr.io/aiscribe152-hermes/kasm-bambu-studio:1.1
            ghcr.io/aiscribe152-hermes/kasm-bambu-studio:latest
          labels: |
            org.opencontainers.image.title=Kasm Bambu Studio Workspace
            org.opencontainers.image.description=Small Kasm workspace image for Bambu Studio slicing and 3D printing workflows
            org.opencontainers.image.version=1.1
            org.opencontainers.image.source=https://github.com/aiscribe152-hermes/hermes-kasm-workspaces
