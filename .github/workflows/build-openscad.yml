name: Build OpenSCAD Kasm Workspace

on:
  push:
    branches:
      - main
    paths:
      - openscad/**
      - .github/workflows/build-openscad.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-openscad-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OpenSCAD workspace image
        uses: docker/build-push-action@v6
        with:
          context: ./openscad
          file: ./openscad/Dockerfile
          push: true
          tags: |
            ghcr.io/aiscribe152-hermes/kasm-openscad:1.1
            ghcr.io/aiscribe152-hermes/kasm-openscad:latest
          labels: |
            org.opencontainers.image.title=Kasm OpenSCAD Workspace
            org.opencontainers.image.description=Small Kasm workspace image for OpenSCAD parametric CAD
            org.opencontainers.image.version=1.1
            org.opencontainers.image.source=https://github.com/aiscribe152-hermes/hermes-kasm-workspaces
