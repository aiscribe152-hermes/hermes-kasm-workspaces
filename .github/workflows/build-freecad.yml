name: Build FreeCAD Kasm Workspace

on:
  push:
    branches:
      - main
    paths:
      - freecad/**
      - .github/workflows/build-freecad.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-freecad-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push FreeCAD workspace image
        uses: docker/build-push-action@v6
        with:
          context: ./freecad
          file: ./freecad/Dockerfile
          push: true
          tags: |
            ghcr.io/aiscribe152-hermes/hermes-kasm-freecad:1.0
            ghcr.io/aiscribe152-hermes/hermes-kasm-freecad:latest
          labels: |
            org.opencontainers.image.title=Hermes Kasm FreeCAD Workspace
            org.opencontainers.image.description=Small Kasm workspace image for FreeCAD using the upstream FreeCAD AppImage
            org.opencontainers.image.version=1.0
            org.opencontainers.image.source=https://github.com/aiscribe152-hermes/hermes-kasm-workspaces
