name: Build Forge Kasm Workspace

on:
  push:
    branches:
      - main
    paths:
      - forge/**
      - .github/workflows/build-forge.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-forge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Forge workspace image
        uses: docker/build-push-action@v6
        with:
          context: ./forge
          file: ./forge/Dockerfile
          push: true
          tags: |
            ghcr.io/aiscribe152-hermes/hermes-kasm-forge:1.1
            ghcr.io/aiscribe152-hermes/hermes-kasm-forge:latest
          labels: |
            org.opencontainers.image.title=Hermes Kasm Forge Workspace
            org.opencontainers.image.description=Kasm workspace image for OpenSCAD, FreeCAD, Blender, Bambu Studio, Python, git, curl, jq, and build tools
            org.opencontainers.image.source=https://github.com/aiscribe152-hermes/hermes-kasm-workspaces
